<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Discord Live Profile</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --black:  #0a0a0a;
  --white:  #f0ede8;
  --yellow: #f5e642;
  --purple: #7c5af6;
  --border: 3px solid #0a0a0a;
  --shadow-lg: 10px 10px 0px #0a0a0a;
}

body {
  background: transparent;
  font-family: 'Space Grotesk', sans-serif;
  display: inline-block;
}

/* ─── NAMEPLATE TRIGGER ─────────────────────────────────── */
.nameplate-trigger {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  position: relative;
  user-select: none;
  /* No extra styles — let it blend into whatever site context */
}

.nameplate-img,
.nameplate-trigger video {
  height: 36px;
  width: auto;
  display: block;
  filter: drop-shadow(0 2px 6px rgba(124,90,246,0.4));
  transition: filter 0.35s ease, transform 0.35s ease;
}

.nameplate-trigger:hover .nameplate-img,
.nameplate-trigger:hover video {
  filter: drop-shadow(0 0 10px rgba(124,90,246,0.9)) drop-shadow(0 0 24px rgba(124,90,246,0.5));
  transform: scale(1.06);
}



/* ─── MODAL OVERLAY ─────────────────────────────────────── */
.dc-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(6px);
  z-index: 9998;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.22s ease;
}

.dc-overlay.open {
  opacity: 1;
  pointer-events: all;
}

/* ─── CARD ──────────────────────────────────────────────── */
.card {
  width: 400px;
  background: var(--white);
  border: var(--border);
  border-radius: 0;
  box-shadow: var(--shadow-lg);
  position: relative;
  z-index: 9999;
  transform: translateY(24px) scale(0.96);
  transition: transform 0.25s cubic-bezier(.34,1.4,.64,1);
}

.dc-overlay.open .card {
  transform: translateY(0) scale(1);
}

/* Close button */
.card-close {
  position: absolute;
  top: 10px;
  left: 10px;
  z-index: 10000;
  width: 28px;
  height: 28px;
  background: var(--black);
  color: var(--yellow);
  border: 2px solid var(--black);
  font-family: 'Space Mono', monospace;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.1s, color 0.1s;
}
.card-close:hover {
  background: var(--yellow);
  color: var(--black);
}

/* Top label — centered */
.card-label {
  position: absolute;
  top: -16px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--black);
  color: var(--yellow);
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 4px 10px;
  z-index: 10;
  white-space: nowrap;
}



/* Nameplate strip — full top of card, animated */
.nameplate-strip {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  border-bottom: var(--border);
  background: #000;
  overflow: hidden;
  height: 120px;
  position: relative;
}

.nameplate-strip video,
.nameplate-strip img {
  height: 100%;
  width: 100%;
  object-fit: cover;
  object-position: center;
}

/* Status pill overlaid on nameplate */
.nameplate-status {
  position: absolute;
  top: 12px;
  right: 12px;
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  background: var(--yellow);
  color: var(--black);
  border: 2px solid var(--black);
  padding: 4px 8px;
  display: flex;
  align-items: center;
  gap: 6px;
  z-index: 5;
}

.status-dot-banner {
  width: 8px; height: 8px;
  border-radius: 50%;
  border: 1.5px solid var(--black);
  flex-shrink: 0;
}

.content { padding: 0 20px 20px; }

/* Avatar row */
.avatar-row {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-top: -52px;
  margin-bottom: 16px;
  position: relative;
}

.avatar-wrap {
  position: relative;
  width: 100px; height: 100px;
  flex-shrink: 0;
}

.avatar {
  width: 100px; height: 100px;
  border-radius: 50%;
  border: 4px solid var(--white);
  outline: 3px solid var(--black);
  object-fit: cover;
  display: block;
  background: #ccc;
}

.avatar-deco {
  position: absolute;
  inset: -14px;
  width: calc(100% + 28px);
  height: calc(100% + 28px);
  pointer-events: none;
  object-fit: contain;
}

.avatar-status {
  position: absolute;
  bottom: 4px; right: 4px;
  width: 20px; height: 20px;
  border-radius: 50%;
  border: 3px solid var(--white);
  outline: 2px solid var(--black);
  z-index: 5;
}

.guild-tag {
  background: var(--black);
  color: var(--yellow);
  font-family: 'Space Mono', monospace;
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.08em;
  padding: 6px 12px;
  border: 2px solid var(--black);
  box-shadow: 3px 3px 0 var(--purple);
  text-transform: uppercase;
  margin-bottom: 4px;
}

.name-block { margin-bottom: 16px; }

.display-name {
  font-size: 26px; font-weight: 800;
  color: var(--black);
  line-height: 1; letter-spacing: -0.02em;
}

.username {
  font-family: 'Space Mono', monospace;
  font-size: 12px; color: #555; margin-top: 4px;
}

.divider { height: 3px; background: var(--black); margin: 16px 0; }

.section {
  border: var(--border);
  background: var(--white);
  box-shadow: 4px 4px 0 var(--black);
  margin-bottom: 14px;
  overflow: hidden;
}

.section-header {
  background: var(--black);
  color: var(--yellow);
  font-family: 'Space Mono', monospace;
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  padding: 6px 12px;
}

.section-body { padding: 12px; }

.activity-row { display: flex; align-items: center; gap: 12px; }

.activity-icon {
  width: 36px; height: 36px;
  background: var(--purple);
  border: 2px solid var(--black);
  display: flex; align-items: center; justify-content: center;
  color: var(--white); font-size: 16px; flex-shrink: 0;
}

.activity-text { font-size: 13px; color: var(--black); line-height: 1.5; font-weight: 500; }

.no-activity {
  font-family: 'Space Mono', monospace;
  font-size: 12px; color: #777; letter-spacing: 0.05em;
}

.act-inner { display: flex; align-items: center; gap: 12px; }

.act-art { position: relative; flex-shrink: 0; width: 52px; height: 52px; }

.act-large {
  width: 52px; height: 52px;
  border-radius: 8px;
  border: 2px solid var(--black);
  object-fit: cover; display: block; background: #ddd;
}

.act-small {
  position: absolute; bottom: -6px; right: -6px;
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 2px solid var(--black);
  object-fit: cover; background: var(--white);
}

.act-info { display: flex; flex-direction: column; gap: 2px; }
.act-info strong { font-size: 13px; font-weight: 800; color: var(--black); line-height: 1.2; }
.act-info span   { font-size: 11px; color: #555; line-height: 1.3; }

.act-elapsed {
  font-family: 'Space Mono', monospace !important;
  font-size: 10px !important;
  color: var(--purple) !important;
  font-weight: 700; margin-top: 2px;
}

.device-row { display: flex; gap: 10px; }

.device-chip {
  display: flex; align-items: center; gap: 6px;
  border: 2px solid var(--black);
  padding: 5px 10px;
  font-family: 'Space Mono', monospace;
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--black); background: var(--white);
  transition: background 0.1s, color 0.1s, box-shadow 0.1s;
}

.device-chip.active {
  background: var(--black); color: var(--yellow);
  box-shadow: 3px 3px 0 var(--purple);
}

.device-chip i { font-size: 13px; }

.footer-bar {
  margin-top: 18px;
  display: flex; justify-content: space-between; align-items: center;
  border-top: var(--border); padding-top: 12px;
}

.footer-id { font-family: 'Space Mono', monospace; font-size: 9px; color: #999; letter-spacing: 0.06em; }

.footer-live {
  display: flex; align-items: center; gap: 6px;
  font-family: 'Space Mono', monospace;
  font-size: 9px; font-weight: 700;
  color: var(--black); text-transform: uppercase; letter-spacing: 0.12em;
}

.live-pulse {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #23a55a;
  border: 1.5px solid var(--black);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(35,165,90,0.5); }
  50%       { box-shadow: 0 0 0 5px rgba(35,165,90,0); }
}
</style>
</head>

<body>

<!-- ── NAMEPLATE TRIGGER (embed this anywhere on your site) ── -->
<div class="nameplate-trigger" id="nameplateBtn" title="View Discord Profile">
  <video id="nameplateVideo" class="nameplate-img" loop muted playsinline></video>

</div>

<!-- ── MODAL OVERLAY ──────────────────────────────────────── -->
<div class="dc-overlay" id="dcOverlay">
  <div class="card" id="dcCard">

    <button class="card-close" id="cardClose" title="Close">✕</button>
    <span class="card-label">// DISCORD PROFILE</span>



    <!-- Nameplate strip — replaces banner -->
    <div class="nameplate-strip" id="nameplateStrip">
      <video id="nameplateCardVideo" autoplay loop muted playsinline></video>
      <img id="nameplateCardImg" alt="Nameplate" style="display:none">
      <div class="nameplate-status">
        <span class="status-dot-banner" id="bannerDot"></span>
        <span id="bannerStatusText">...</span>
      </div>
    </div>

    <div class="content">

      <div class="avatar-row">
        <div class="avatar-wrap">
          <img id="avatar" class="avatar" alt="Avatar">
          <img id="avatarDeco" class="avatar-deco" alt="" style="display:none">
          <div class="avatar-status" id="avatarStatus"></div>
        </div>
        <div id="guild" class="guild-tag">GUILD</div>
      </div>

      <div class="name-block">
        <div id="name" class="display-name">Loading...</div>
        <div id="username" class="username">@—</div>
      </div>

      <div class="divider"></div>

      <div class="section">
        <div class="section-header">⚡ Activity</div>
        <div class="section-body">
          <div class="activity-row">
            <div class="activity-icon" id="activityIcon"><i class="fa-solid fa-gamepad"></i></div>
            <div id="activity" class="activity-text no-activity">No Activity</div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-header">// Devices</div>
        <div class="section-body">
          <div class="device-row">
            <div id="chipWeb"     class="device-chip"><i class="fa-solid fa-globe"></i> WEB</div>
            <div id="chipDesktop" class="device-chip"><i class="fa-solid fa-desktop"></i> DESKTOP</div>
            <div id="chipMobile"  class="device-chip"><i class="fa-solid fa-mobile-screen"></i> MOBILE</div>
          </div>
        </div>
      </div>

      <div class="footer-bar">
        <span class="footer-id" id="footerId">ID: —</span>
        <span class="footer-live"><span class="live-pulse" id="livePulse"></span>LIVE</span>
      </div>

    </div>
  </div>
</div>

<script>
const USER_ID = "1411997363396149300";

// Elements
const nameplateBtn      = document.getElementById("nameplateBtn");
const nameplateVideo    = document.getElementById("nameplateVideo");
const nameplateStrip    = document.getElementById("nameplateStrip");
const nameplateCardVideo= document.getElementById("nameplateCardVideo");
const nameplateCardImg  = document.getElementById("nameplateCardImg");
const dcOverlay       = document.getElementById("dcOverlay");
const cardClose       = document.getElementById("cardClose");
const avatar          = document.getElementById("avatar");
const avatarDeco      = document.getElementById("avatarDeco");
const avatarStatus    = document.getElementById("avatarStatus");
const nameEl          = document.getElementById("name");
const usernameEl      = document.getElementById("username");
const guild           = document.getElementById("guild");
const bannerDot       = document.getElementById("bannerDot");
const bannerStatusText= document.getElementById("bannerStatusText");
const activity        = document.getElementById("activity");
const activityIcon    = document.getElementById("activityIcon");
const chipWeb         = document.getElementById("chipWeb");
const chipDesktop     = document.getElementById("chipDesktop");
const chipMobile      = document.getElementById("chipMobile");
const footerId        = document.getElementById("footerId");
const livePulse       = document.getElementById("livePulse");

let activityStart = null;
let currentNameplateAsset = null;
let hasNameplate = false;

const STATUS = {
  online:  { bg: "#23a55a", label: "ONLINE" },
  idle:    { bg: "#f0b232", label: "IDLE" },
  dnd:     { bg: "#f23f43", label: "DND" },
  offline: { bg: "#747f8d", label: "OFFLINE" }
};

// ── Modal open / close ────────────────────────────────────
function openModal() {
  dcOverlay.classList.add("open");
  // Card strip has autoplay+loop in HTML, so it starts looping on its own
  // as soon as loadProfile() sets a real src. Only nudge play() here if a
  // nameplate actually exists and it somehow isn't already playing.
  if (hasNameplate && nameplateCardVideo.paused) {
    nameplateCardVideo.play().catch(() => {});
  }
  // Trigger video shouldn't keep playing under the opened modal
  if (!nameplateVideo.paused) nameplateVideo.pause();
}
function closeModal() { dcOverlay.classList.remove("open"); }

nameplateBtn.addEventListener("click", openModal);

// Trigger nameplate: animate ONLY while actively interacting (hover),
// freeze immediately otherwise — never autoplay before interaction.
// Guard against play() being called before a nameplate src is set.
nameplateBtn.addEventListener("mouseenter", () => {
  if (hasNameplate) nameplateVideo.play().catch(() => {});
});
nameplateBtn.addEventListener("mouseleave", () => {
  if (!nameplateVideo.paused) nameplateVideo.pause();
});


cardClose.addEventListener("click", closeModal);
dcOverlay.addEventListener("click", e => { if (e.target === dcOverlay) closeModal(); });
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

// ── Asset resolver ────────────────────────────────────────
function resolveAsset(str, appId) {
  if (!str) return null;
  if (str.startsWith("mp:external/")) {
    const parts = str.replace("mp:external/", "").split("/");
    parts.shift();
    return "https://" + parts.join("/");
  }
  if (str.startsWith("http")) return str;
  if (appId) return `https://cdn.discordapp.com/app-assets/${appId}/${str}.png`;
  return null;
}

// ── Build nameplate URL ────────────────────────────────────
// Correct Discord CDN path per docs.discord.food/reference:
// /assets/collectibles/{asset_path}{asset_name}
// Valid asset names: img.png, static.png, asset.webm
// asset from API: "nameplates/trapped_souls/1516560201149452398/"
function buildNameplateUrl(asset) {
  const path = asset.endsWith("/") ? asset : asset + "/";
  // Return both URLs — webm is animated, static.png is fallback
  return {
    webm: `https://cdn.discordapp.com/assets/collectibles/${path}asset.webm`,
    png:  `https://cdn.discordapp.com/assets/collectibles/${path}static.png`
  };
}

// ── Load profile ──────────────────────────────────────────
async function loadProfile() {
  try {
    const res  = await fetch(`https://api.lanyard.rest/v1/users/${USER_ID}`);
    const json = await res.json();
    if (!json.success) return;

    const data = json.data;
    const user = data.discord_user;

    // Avatar
    avatar.src = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png?size=512`;

    // Decoration
    if (user.avatar_decoration_data) {
      avatarDeco.src = `https://cdn.discordapp.com/avatar-decoration-presets/${user.avatar_decoration_data.asset}.png`;
      avatarDeco.style.display = "block";
    }

    // Name / username
    nameEl.textContent   = user.display_name || user.username;
    usernameEl.textContent = "@" + user.username;

    // Guild
    guild.textContent = user.primary_guild?.tag || "NO GUILD";

    // Nameplate
    const np = user.collectibles?.nameplate;
    if (np?.asset && np.asset !== currentNameplateAsset) {
      // Only touch the <video> elements when the nameplate actually changes.
      // Re-assigning .src on every 10s poll was restarting playback from
      // frame 0 each time — that's what broke the "loop" (trigger froze on
      // a random frame, card strip kept snapping back to frame 0).
      currentNameplateAsset = np.asset;
      const npUrls = buildNameplateUrl(np.asset);

      // Trigger — animated webm, plays only when interacted with
      nameplateVideo.src = npUrls.webm;
      nameplateVideo.title = np.label || "Nameplate";
      hasNameplate = true;
      nameplateVideo.onerror = () => { hasNameplate = false; nameplateVideo.style.display="none"; };

      // Card strip — animated webm with img fallback, loops continuously
      nameplateCardVideo.src = npUrls.webm;
      nameplateCardVideo.onerror = () => {
        hasNameplate = false;
        nameplateCardVideo.style.display = "none";
        nameplateCardImg.src = npUrls.png;
        nameplateCardImg.style.display = "block";
      };
      // strip always visible
    } else if (!np?.asset) {
      hasNameplate = false;
    }

    // Status
    const s = STATUS[data.discord_status] || STATUS.offline;
    bannerDot.style.background    = s.bg;
    bannerStatusText.textContent  = s.label;
    avatarStatus.style.background = s.bg;
    livePulse.style.background    = s.bg;

    // Footer
    footerId.textContent = "ID: " + user.id;

    // Activity
    if (data.activities && data.activities.length) {
      const a = data.activities[0];
      activity.classList.remove("no-activity");

      const largeImg  = resolveAsset(a.assets?.large_image, a.application_id);
      const smallImg  = resolveAsset(a.assets?.small_image, a.application_id);
      const largeText = a.assets?.large_text || "";
      const smallText = a.assets?.small_text || "";

      activityIcon.style.display = largeImg ? "none" : "flex";
      activityStart = a.timestamps?.start || null;

      const elapsed = buildElapsed();

      activity.innerHTML = `
        <div class="act-inner">
          ${largeImg ? `
          <div class="act-art">
            <img class="act-large" src="${largeImg}" title="${largeText}" onerror="this.parentElement.style.display='none'">
            ${smallImg ? `<img class="act-small" src="${smallImg}" title="${smallText}" onerror="this.style.display='none'">` : ""}
          </div>` : ""}
          <div class="act-info">
            <strong>${a.name || ""}</strong>
            ${a.details ? `<span>${a.details}</span>` : ""}
            ${a.state   ? `<span>${a.state}</span>`   : ""}
            ${elapsed   ? `<span class="act-elapsed">⏱ ${elapsed} elapsed</span>` : ""}
          </div>
        </div>`;
    } else {
      activityStart = null;
      activity.classList.add("no-activity");
      activity.innerHTML = "No Activity";
      activityIcon.style.display = "flex";
    }

    // Devices
    chipWeb.classList.toggle("active",     !!data.active_on_discord_web);
    chipDesktop.classList.toggle("active", !!data.active_on_discord_desktop);
    chipMobile.classList.toggle("active",  !!data.active_on_discord_mobile);

  } catch (err) {
    console.error(err);
  }
}

function buildElapsed() {
  if (!activityStart) return "";
  const secs = Math.floor((Date.now() - activityStart) / 1000);
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  const s = secs % 60;
  return h > 0
    ? `${h}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`
    : `${m}:${String(s).padStart(2,"0")}`;
}

function tickElapsed() {
  const el = document.querySelector(".act-elapsed");
  if (!el || !activityStart) return;
  el.textContent = `⏱ ${buildElapsed()} elapsed`;
}

loadProfile();
setInterval(loadProfile, 10000);
setInterval(tickElapsed, 1000);
</script>
</body>
</html>
